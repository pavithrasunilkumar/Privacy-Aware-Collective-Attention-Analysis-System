<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RIG Viewer</title>
  <script type="text/javascript" src="https://unpkg.com/vis-network@9.1.9/dist/vis-network.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f5f8;
      --panel: #ffffffd9;
      --panel-border: #d8dde8;
      --text: #1b2430;
      --muted: #627086;
      --accent: #2d5bff;
      --chip-bg: #eef2f8;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: 'Manrope', system-ui, sans-serif;
      background:
        radial-gradient(1100px 680px at -10% -10%, #dce6ff 0%, transparent 65%),
        radial-gradient(900px 620px at 110% 110%, #ffe9da 0%, transparent 68%),
        var(--bg);
      color: var(--text);
      overflow: hidden;
    }
    
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }

    #toolbar {
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
      padding: 12px 20px;
      background: var(--panel);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--panel-border);
      position: absolute; top: 0; left: 0; right: 0; z-index: 20;
      box-shadow: 0 8px 32px rgba(8, 25, 67, 0.08);
    }
    #toolbar strong {
      font-family: 'Fraunces', serif;
      font-size: 19px;
      font-weight: 700;
      letter-spacing: 0.01em;
      color: #17202f;
    }
    .badge {
      padding: 4px 11px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      background: var(--chip-bg);
      color: #314157;
      border: 1px solid #dce3ef;
    }
    #status {
      font-size: 12px;
      color: var(--muted);
      flex: 1;
      min-width: 80px;
      text-align: right;
      font-weight: 600;
    }
    #searchBox {
      padding: 7px 14px;
      border-radius: 12px;
      border: 1px solid #d7dfed;
      background: #fff;
      color: #1b2430;
      font-size: 13px;
      width: 260px;
      outline: none; transition: all 0.2s ease;
    }
    #searchBox:focus {
      border-color: #b7c6f3;
      box-shadow: 0 0 0 3px rgba(45, 91, 255, 0.14);
    }
    button {
      padding: 7px 14px;
      border-radius: 12px;
      border: 1px solid #d3dbeb;
      background: #fff;
      color: #2a3648;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.2s;
    }
    button:hover { background: #f7faff; border-color: #b8c9f1; transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    button.active {
      background: #1f5bff;
      border-color: #1f5bff;
      color: #fff;
      box-shadow: 0 8px 20px rgba(31, 91, 255, 0.28);
    }

    #physicsPanel {
      position: absolute;
      left: 20px;
      top: 76px;
      z-index: 11;
      width: 320px;
      max-width: calc(100vw - 40px);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid #d8deeb;
      box-shadow: 0 14px 36px rgba(16, 36, 79, 0.14);
      padding: 14px;
      display: none;
    }
    #physicsPanel.visible { display: block; }
    .phy-grid {
      display: grid;
      grid-template-columns: 1fr 88px;
      gap: 8px;
      align-items: center;
      margin-top: 8px;
    }
    .phy-grid label { font-size: 11px; color: #4f6078; font-weight: 700; }
    .phy-grid input[type="number"], .phy-grid input[type="range"] {
      width: 100%;
    }
    .phy-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    #kindFilters { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .kind-pill {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 600;
      cursor: pointer; border: 1px solid #d4dded; transition: all 0.2s;
      user-select: none; background: #fff;
    }
    .kind-pill:hover { border-color: #b7c7ea; }
    .kind-pill input { display: none; }
    .kind-pill .dot { width: 8px; height: 8px; border-radius: 50%; box-shadow: 0 0 8px currentColor; }
    .kind-pill.off { opacity: 0.4; filter: grayscale(100%); }

    #main { position: relative; height: 100vh; width: 100vw; padding-top: 56px; }
    #graph { width: 100%; height: 100%; }

    #infoPanel {
      position: absolute; right: 20px; top: 76px; bottom: 20px;
      width: 320px; border-radius: 16px;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      border: 1px solid #d8deeb;
      box-shadow: 0 18px 40px rgba(16, 36, 79, 0.18);
      padding: 24px; overflow-y: auto;
      font-size: 13px; display: none; flex-direction: column; gap: 16px;
      transform: translateX(120%);
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 10;
    }
    #infoPanel.visible { display: flex; transform: translateX(0); }

    #infoPanel h3 {
      font-size: 16px; font-weight: 700; color: #131c2b;
      word-break: break-all; margin-bottom: 4px;
    }
    .ip-section {
      background: #f8fbff;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #dce5f5;
    }
    .ip-section strong {
      display: block; color: #4f6078; font-size: 10px;
      text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px;
    }
    #infoPanel ul { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    #infoPanel li { color: #1f2c42; word-break: break-all; line-height: 1.45; }
    #infoPanel li code {
      background: #e9effb;
      border-radius: 6px;
      padding: 2px 6px;
      font-size: 11px;
      font-family: ui-monospace, monospace;
      color: #22324a;
    }
    .neighbor-link { color: #2b5cff; cursor: pointer; text-decoration: none; font-weight: 600; transition: color 0.15s; }
    .neighbor-link:hover { color: #1132a1; text-decoration: underline; }

    .empty-row {
      color: #73839a !important;
      font-style: italic;
    }

    #expandSubgraphBtn {
      margin-top: auto; width: 100%;
      background: #edf2ff; color: #2147cc;
      border: 1px solid #cad8ff;
      padding: 10px; border-radius: 8px; font-weight: 600;
    }
    #expandSubgraphBtn:hover { background: #dfe9ff; border-color: #b6c9ff; }

    @media (max-width: 980px) {
      #searchBox { width: 100%; order: 6; }
      #toolbar { padding: 10px 12px; }
      #status { width: 100%; text-align: left; }
      #infoPanel {
        left: 10px;
        right: 10px;
        width: auto;
        top: 126px;
        bottom: 10px;
      }
    }
  </style>
</head>
<body>

      </div>
      <div class="ip-section">

        <ul id="ipNeighbors"></ul>

        .map(makeVisEdge);

      visNodes.clear(); visEdges.clear();
      visNodes.add(filteredNodes); visEdges.add(filteredEdges);
      resetHighlight();
      if (q) {
        const first = filteredNodes[0];
        if (first) network.focus(first.id, { animation: { duration: 250 } });
      }
      updateStatus(q ? ('Filtering: ' + filteredNodes.length + ' nodes') : ('Showing ' + filteredNodes.length + ' nodes'));
    }

    function readPhysicsInputs() {
      return {
        repulsion: Number(phyRepulsion.value),
        springLength: Number(phySpringLength.value),
        damping: Number(phyDamping.value),
        centralGravity: Number(phyCentral.value),
        maxVelocity: Number(phyMaxVel.value),
        minVelocity: Number(phyMinVel.value),
        stabilizationIterations: Number(phyIters.value),
      };
    }

    function writePhysicsInputs(v) {
      phyRepulsion.value = String(v.repulsion);
      phySpringLength.value = String(v.springLength);
      phyDamping.value = String(v.damping);
      phyCentral.value = String(v.centralGravity);
      phyMaxVel.value = String(v.maxVelocity);
      phyMinVel.value = String(v.minVelocity);
      phyIters.value = String(v.stabilizationIterations);
    }

    function applyPhysicsValues(v) {
      network.setOptions({
        physics: {
          enabled: physicsOn,
          solver: 'barnesHut',
          stabilization: { enabled: true, iterations: v.stabilizationIterations },
          barnesHut: {
            gravitationalConstant: v.repulsion,
            springLength: v.springLength,
            damping: v.damping,
            centralGravity: v.centralGravity,
            avoidOverlap: 0.4,
          },
          maxVelocity: v.maxVelocity,
          minVelocity: v.minVelocity,
        },
      });
      network.stabilize(v.stabilizationIterations);
      updateStatus('Physics updated');
    }

    fitBtn.addEventListener("click", () => network.fit({ animation: { duration: 250 } }));

    resetBtn.addEventListener("click", () => {
      searchBox.value = "";
      for (const kind of allKinds) { kindVisible[kind] = true; }
      document.querySelectorAll(".kind-pill").forEach((p) => {
        p.classList.remove("off");
        p.querySelector("input").checked = true;
      });
      visNodes.clear(); visEdges.clear();
      visNodes.add(rawNodes.map(makeVisNode));
      visEdges.add(rawEdges.map(makeVisEdge));
      resetHighlight();
      network.fit({ animation: { duration: 250 } });
      updateStatus("Ready");
    });

    let physicsOn = true;
    physicsBtn.addEventListener("click", () => {
      physicsOn = !physicsOn;
      network.setOptions({ physics: { enabled: physicsOn } });
      physicsBtn.textContent = physicsOn ? "Physics: On" : "Physics: Off";
      physicsBtn.classList.toggle("active", physicsOn);
    });

    physicsTuneBtn.addEventListener('click', () => {
      physicsPanel.classList.toggle('visible');
    });

    applyPhysicsBtn.addEventListener('click', () => {
      applyPhysicsValues(readPhysicsInputs());
    });

    resetPhysicsBtn.addEventListener('click', () => {
      writePhysicsInputs(defaultPhysics);
      applyPhysicsValues(defaultPhysics);
    });

    writePhysicsInputs(defaultPhysics);
    currentScale = network.getScale();
    applyLabelsForScale();
  </script>
</body>
</html>

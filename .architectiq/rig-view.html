<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RIG Viewer</title>
  <script type="text/javascript" src="https://unpkg.com/vis-network@9.1.9/dist/vis-network.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f5f8;
      --panel: #ffffffd9;
      --panel-border: #d8dde8;
      --text: #1b2430;
      --muted: #627086;
      --accent: #2d5bff;
      --chip-bg: #eef2f8;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: 'Manrope', system-ui, sans-serif;
      background:
        radial-gradient(1100px 680px at -10% -10%, #dce6ff 0%, transparent 65%),
        radial-gradient(900px 620px at 110% 110%, #ffe9da 0%, transparent 68%),
        var(--bg);
      color: var(--text);
      overflow: hidden;
    }
    
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }

    #toolbar {
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
      padding: 12px 20px;
      background: var(--panel);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--panel-border);
      position: absolute; top: 0; left: 0; right: 0; z-index: 20;
      box-shadow: 0 8px 32px rgba(8, 25, 67, 0.08);
    }
    #toolbar strong {
      font-family: 'Fraunces', serif;
      font-size: 19px;
      font-weight: 700;
      letter-spacing: 0.01em;
      color: #17202f;
    }
    .badge {
      padding: 4px 11px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      background: var(--chip-bg);
      color: #314157;
      border: 1px solid #dce3ef;
    }
    #status {
      font-size: 12px;
      color: var(--muted);
      flex: 1;
      min-width: 80px;
      text-align: right;
      font-weight: 600;
    }
    #searchBox {
      padding: 7px 14px;
      border-radius: 12px;
      border: 1px solid #d7dfed;
      background: #fff;
      color: #1b2430;
      font-size: 13px;
      width: 260px;
      outline: none; transition: all 0.2s ease;
    }
    #searchBox:focus {
      border-color: #b7c6f3;
      box-shadow: 0 0 0 3px rgba(45, 91, 255, 0.14);
    }
    button {
      padding: 7px 14px;
      border-radius: 12px;
      border: 1px solid #d3dbeb;
      background: #fff;
      color: #2a3648;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.2s;
    }
    button:hover { background: #f7faff; border-color: #b8c9f1; transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    button.active {
      background: #1f5bff;
      border-color: #1f5bff;
      color: #fff;
      box-shadow: 0 8px 20px rgba(31, 91, 255, 0.28);
    }

    #physicsPanel {
      position: absolute;
      left: 20px;
      top: 76px;
      z-index: 11;
      width: 320px;
      max-width: calc(100vw - 40px);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid #d8deeb;
      box-shadow: 0 14px 36px rgba(16, 36, 79, 0.14);
      padding: 14px;
      display: none;
    }
    #physicsPanel.visible { display: block; }
    .phy-grid {
      display: grid;
      grid-template-columns: 1fr 88px;
      gap: 8px;
      align-items: center;
      margin-top: 8px;
    }
    .phy-grid label { font-size: 11px; color: #4f6078; font-weight: 700; }
    .phy-grid input[type="number"], .phy-grid input[type="range"] {
      width: 100%;
    }
    .phy-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    #kindFilters { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .kind-pill {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 600;
      cursor: pointer; border: 1px solid #d4dded; transition: all 0.2s;
      user-select: none; background: #fff;
    }
    .kind-pill:hover { border-color: #b7c7ea; }
    .kind-pill input { display: none; }
    .kind-pill .dot { width: 8px; height: 8px; border-radius: 50%; box-shadow: 0 0 8px currentColor; }
    .kind-pill.off { opacity: 0.4; filter: grayscale(100%); }

    #main { position: relative; height: 100vh; width: 100vw; padding-top: 56px; }
    #graph { width: 100%; height: 100%; }

    #infoPanel {
      position: absolute; right: 20px; top: 76px; bottom: 20px;
      width: 320px; border-radius: 16px;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      border: 1px solid #d8deeb;
      box-shadow: 0 18px 40px rgba(16, 36, 79, 0.18);
      padding: 24px; overflow-y: auto;
      font-size: 13px; display: none; flex-direction: column; gap: 16px;
      transform: translateX(120%);
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 10;
    }
    #infoPanel.visible { display: flex; transform: translateX(0); }

    #infoPanel h3 {
      font-size: 16px; font-weight: 700; color: #131c2b;
      word-break: break-all; margin-bottom: 4px;
    }
    .ip-section {
      background: #f8fbff;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #dce5f5;
    }
    .ip-section strong {
      display: block; color: #4f6078; font-size: 10px;
      text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px;
    }
    #infoPanel ul { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    #infoPanel li { color: #1f2c42; word-break: break-all; line-height: 1.45; }
    #infoPanel li code {
      background: #e9effb;
      border-radius: 6px;
      padding: 2px 6px;
      font-size: 11px;
      font-family: ui-monospace, monospace;
      color: #22324a;
    }
    .neighbor-link { color: #2b5cff; cursor: pointer; text-decoration: none; font-weight: 600; transition: color 0.15s; }
    .neighbor-link:hover { color: #1132a1; text-decoration: underline; }

    .empty-row {
      color: #73839a !important;
      font-style: italic;
    }

    #expandSubgraphBtn {
      margin-top: auto; width: 100%;
      background: #edf2ff; color: #2147cc;
      border: 1px solid #cad8ff;
      padding: 10px; border-radius: 8px; font-weight: 600;
    }
    #expandSubgraphBtn:hover { background: #dfe9ff; border-color: #b6c9ff; }

    @media (max-width: 980px) {
      #searchBox { width: 100%; order: 6; }
      #toolbar { padding: 10px 12px; }
      #status { width: 100%; text-align: left; }
      #infoPanel {
        left: 10px;
        right: 10px;
        width: auto;
        top: 126px;
        bottom: 10px;
      }
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <strong>RIG</strong>
    <span class="badge" id="nodeCountBadge">Nodes: 192</span>
    <span class="badge" id="edgeCountBadge">Edges: 260</span>
    <input id="searchBox" type="search" placeholder="Search nodes..." autocomplete="off" />
    <div id="kindFilters"></div>
    <button id="resetBtn">Reset View</button>
    <button id="fitBtn">Fit All</button>
    <button id="physicsBtn" class="active">Physics: On</button>
    <button id="physicsTuneBtn">Tune Physics</button>
    <span id="status">Preparing...</span>
  </div>
  <div id="main">
    <div id="graph"></div>
    <div id="physicsPanel">

      <div class="phy-grid">

        <input id="phyRepulsion" type="number" value="-1200" step="10" />

        <input id="phySpringLength" type="number" value="90" step="5" />

        <input id="phyCentral" type="number" value="0.2" step="0.01" min="0" max="2" />
        <label for="phyMaxVel">Max Velocity</label>
        <input id="phyMaxVel" type="number" value="8" step="0.5" min="0" />
        <label for="phyMinVel">Min Velocity</label>
        <input id="phyMinVel" type="number" value="0.1" step="0.1" min="0" />
        <label for="phyIters">Stabilization Iterations</label>
        <input id="phyIters" type="number" value="150" step="10" min="1" />
      </div>
      <div class="phy-actions">
        <button id="applyPhysicsBtn" class="active" style="flex:1;">Apply</button>
        <button id="resetPhysicsBtn" style="flex:1;">Reset</button>
      </div>
    </div>
    <div id="infoPanel">
      <h3 id="ipName">-</h3>
      <div class="ip-section">
        <strong>Kind</strong>
        <span id="ipKind" class="badge" style="border:none; padding:4px 10px;">-</span>
      </div>
      <div class="ip-section" id="ipPropsSection">
        <strong>Properties</strong>
        <ul id="ipProps"></ul>
      </div>
      <div class="ip-section" id="ipEvidenceSection">
        <strong>Evidence</strong>
        <ul id="ipEvidence"></ul>
      </div>
      <div class="ip-section">
        <strong>Neighbors</strong>
        <ul id="ipNeighbors"></ul>
      </div>
      <button id="expandSubgraphBtn">Focus Subgraph</button>
    </div>
  </div>

      pill.innerHTML = '<input type="checkbox" checked /><span class="dot" style="background:' + c.border + '; box-shadow: 0 0 8px ' + c.border + '"></span>' + kind;
      const cb = pill.querySelector('input');
      cb.addEventListener('change', () => {
        kindVisible[kind] = cb.checked;
        pill.classList.toggle('off', !cb.checked);
        applyFilters();
      });
      kindFiltersEl.appendChild(pill);
    }

    const visNodes = new vis.DataSet();
    const visEdges = new vis.DataSet();

    function getNodeLabel(n) {
      const source = n.name || n.id || '';
      const normalized = String(source).replace(/\\/g, '/');
      const parts = normalized.split('/');
      return parts[parts.length - 1] || source;
    }

    function shortLabel(name) {
      const source = String(name || '');
      const parts = source.replace(/\\/g, '/').split('/');
      const tail = parts[parts.length - 1] || source;
      return tail.length > 28 ? (tail.slice(0, 26) + '..') : tail;
    }

    let currentScale = 1;
    function labelForScale(n) {
      if (currentScale < 0.65) return '';
      if (currentScale < 1.1) return shortLabel(getNodeLabel(n));
      return getNodeLabel(n);
    }

    function makeVisNode(n) {
      const c = kindColor[n.kind] || { bg: '#546277', border: '#3a4659' };
      return {
        id: n.id,
        label: labelForScale(n),
        title: n.name,
        color: {
          background: c.bg,
          border: c.border,
          highlight: { background: c.border, border: '#ffffff' },
          hover: { background: c.border, border: '#ffffff' },
        },
        shape: 'dot',
        size: n.kind === 'File' ? 11 : 9,
        font: { color: '#0f172a', size: 11, face: 'Manrope', strokeWidth: 3, strokeColor: '#ffffff' },
      };
    }

    function makeVisEdge(e) {
      const col = relationColor[e.relation] || '#475569';
      return {
        id: e.source + '->' + e.target + ':' + e.relation,
        from: e.source,
        to: e.target,
        color: { color: col, opacity: 0.65, highlight: col },
        width: 1.3,
        arrows: { to: { enabled: true, scaleFactor: 0.5 } },
        smooth: { type: 'dynamic' },
      };
    }

    visNodes.add(rawNodes.map(makeVisNode));
    visEdges.add(rawEdges.map(makeVisEdge));

    const defaultPhysics = {
      repulsion: -1200,
      springLength: 90,
      damping: 0.09,
      centralGravity: 0.2,
      maxVelocity: 8,
      minVelocity: 0.1,
      stabilizationIterations: 150,
    };

    const network = new vis.Network(document.getElementById('graph'), { nodes: visNodes, edges: visEdges }, {
      interaction: { hover: true, navigationButtons: true, keyboard: { enabled: true, bindToWindow: false } },
      physics: {
        enabled: true,
        solver: 'barnesHut',
        stabilization: { enabled: true, iterations: defaultPhysics.stabilizationIterations },
        barnesHut: {
          gravitationalConstant: defaultPhysics.repulsion,
          springLength: defaultPhysics.springLength,
          damping: defaultPhysics.damping,
          centralGravity: defaultPhysics.centralGravity,
          avoidOverlap: 0.4,
        },
        maxVelocity: defaultPhysics.maxVelocity,
        minVelocity: defaultPhysics.minVelocity,
      },
    });

    network.once('stabilizationIterationsDone', () => {
      network.fit();
    });

    function applyLabelsForScale() {
      const updates = [];
      for (const n of rawNodes) {
        updates.push({ id: n.id, label: labelForScale(n) });
      }
      visNodes.update(updates);
    }

    network.on('zoom', () => {
      const state = network.getViewPosition();
      if (!state) return;
      currentScale = network.getScale();
      applyLabelsForScale();
    });

    function updateStatus(msg) { statusEl.textContent = msg; }
    updateStatus('Ready');

    let selectedNodeId = null;
    let highlightedNodeIds = new Set();
    let highlightedEdgeIds = new Set();

    function resetHighlight() {
      for (const nodeId of highlightedNodeIds) {
        const n = nodeById.get(nodeId);
        if (!n) continue;
        visNodes.update(makeVisNode(n));
      }
      for (const edgeId of highlightedEdgeIds) {
        const edge = visEdges.get(edgeId);
        if (!edge) continue;
        visEdges.update({ id: edgeId, width: 1.3, color: edge.color });
      }
      highlightedNodeIds = new Set();
      highlightedEdgeIds = new Set();
    }

    function highlightNeighborsDepth1(nid) {
      resetHighlight();
      if (!nid) return;

      const neighborIds = new Set([nid]);
      const candidateEdges = [];
      for (const e of (adjForward.get(nid) || [])) {
        neighborIds.add(e.id);
        candidateEdges.push(nid + '->' + e.id + ':' + e.relation);
      }
      for (const e of (adjReverse.get(nid) || [])) {
        neighborIds.add(e.id);
        candidateEdges.push(e.id + '->' + nid + ':' + e.relation);
      }

      for (const id of neighborIds) {
        const raw = nodeById.get(id);
        if (!raw) continue;
        const base = makeVisNode(raw);
        const isSelected = id === nid;
        visNodes.update({
          ...base,
          id,
          borderWidth: isSelected ? 4 : 2,
          size: isSelected ? (base.size + 4) : (base.size + 1),
          color: isSelected
            ? {
                background: '#ffd166',
                border: '#7c2d12',
                highlight: { background: '#ffb703', border: '#7c2d12' },
                hover: { background: '#ffb703', border: '#7c2d12' },
              }
            : base.color,
        });
        highlightedNodeIds.add(id);
      }

      for (const edgeId of candidateEdges) {
        if (!visEdges.get(edgeId)) continue;
        visEdges.update({ id: edgeId, width: 2.4 });
        highlightedEdgeIds.add(edgeId);
      }
    }

    network.on('click', (params) => {
      if (params.nodes.length === 0) {
        selectedNodeId = null;
        infoPanel.classList.remove('visible');
        resetHighlight();
        return;
      }
      selectedNodeId = params.nodes[0];
      highlightNeighborsDepth1(selectedNodeId);
      showInfoPanel(selectedNodeId);
    });

    function showInfoPanel(nid) {
      const raw = nodeById.get(nid);
      if (!raw) return;

      ipName.textContent = raw.name || nid;
      ipKind.textContent = raw.kind || "-";
      const c = kindColor[raw.kind] || { bg: '#546277', border: '#3a4659' };
      ipKind.style.background = c.bg + '33';
      ipKind.style.color = c.border;
      ipKind.style.border = '1px solid ' + c.border + '33';

      const props = raw.properties || {};
      ipProps.innerHTML = "";
      let propCount = 0;
      for (const [k, v] of Object.entries(props)) {
        if (v === null || v === undefined || v === "") continue;
        const li = document.createElement("li");
        li.innerHTML = '<code>' + k + '</code> ' + String(v).slice(0, 120);
        ipProps.appendChild(li);
        propCount += 1;
      }
      if (propCount === 0) {
        const li = document.createElement("li");
        li.className = "empty-row";
        li.textContent = "No properties available";
        ipProps.appendChild(li);
      }

      const evidence = Array.isArray(raw.evidence) ? raw.evidence : [];
      ipEvidence.innerHTML = "";
      for (const e of evidence.slice(0, 6)) {
        const li = document.createElement("li");
        li.innerHTML = '<code>' + e + '</code>';
        ipEvidence.appendChild(li);
      }
      if (evidence.length === 0) {
        const li = document.createElement("li");
        li.className = "empty-row";
        li.textContent = "No evidence available";
        ipEvidence.appendChild(li);
      }

      ipNeighbors.innerHTML = "";
      const fwd = (adjForward.get(nid) || []).slice(0, 8);
      const rev = (adjReverse.get(nid) || []).slice(0, 8);
      for (const { relation, id } of fwd) {
        const neighbor = nodeById.get(id);
        const li = document.createElement("li");
        const a = document.createElement("span");
        a.className = "neighbor-link";
        a.textContent = neighbor ? neighbor.name : id;
        a.dataset.nid = id;
        a.title = '-> ' + relation;
        li.appendChild(document.createTextNode('↗ [' + relation + '] '));
        li.appendChild(a);
        ipNeighbors.appendChild(li);
      }
      for (const { relation, id } of rev) {
        const neighbor = nodeById.get(id);
        const li = document.createElement("li");
        const a = document.createElement("span");
        a.className = "neighbor-link";
        a.textContent = neighbor ? neighbor.name : id;
        a.dataset.nid = id;
        a.title = '<- ' + relation;
        li.appendChild(document.createTextNode('↙ [' + relation + '] '));
        li.appendChild(a);
        ipNeighbors.appendChild(li);
      }
      if (!fwd.length && !rev.length) {
        const li = document.createElement("li"); li.textContent = "No neighbors"; ipNeighbors.appendChild(li);
      }

      ipNeighbors.querySelectorAll('.neighbor-link').forEach((el) => {
        el.addEventListener('click', () => {
          const tnid = el.dataset.nid;
          network.selectNodes([tnid]);
          network.focus(tnid, { animation: { duration: 300 } });
          highlightNeighborsDepth1(tnid);
          showInfoPanel(tnid);
          selectedNodeId = tnid;
        });
      });

      infoPanel.classList.add("visible");
    }

    expandSubgraphBtn.addEventListener("click", () => {
      if (!selectedNodeId) return;
      const reachable = new Set();
      reachable.add(selectedNodeId);
      for (const { id } of (adjForward.get(selectedNodeId) || [])) reachable.add(id);
      for (const { id } of (adjReverse.get(selectedNodeId) || [])) reachable.add(id);

      const subNodes = rawNodes.filter((n) => reachable.has(n.id)).map(makeVisNode);
      const subEdges = rawEdges
        .filter((e) => reachable.has(e.source) && reachable.has(e.target))
        .map(makeVisEdge);

      visNodes.clear(); visEdges.clear();
      visNodes.add(subNodes); visEdges.add(subEdges);
      network.fit({ animation: { duration: 250 } });
      updateStatus('Focused Subgraph');
    });

    let searchTimer = null;
    searchBox.addEventListener("input", () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(applyFilters, 250);
    });

    function applyFilters() {
      const q = searchBox.value.trim().toLowerCase();
      const matching = new Set();
      for (const n of rawNodes) {
        if (!kindVisible[n.kind || "Unknown"]) continue;
        if (q && !(n.name || "").toLowerCase().includes(q)) continue;
        matching.add(n.id);
      }

      const filteredNodes = rawNodes.filter((n) => matching.has(n.id)).map((n) => {
        const vn = makeVisNode(n);
        if (q && (n.name || "").toLowerCase().includes(q)) {
          vn.borderWidth = 3;
          vn.size = 18;
        }
        return vn;
      });
      const filteredEdges = rawEdges
        .filter((e) => matching.has(e.source) && matching.has(e.target))
        .map(makeVisEdge);

      visNodes.clear(); visEdges.clear();
      visNodes.add(filteredNodes); visEdges.add(filteredEdges);
      resetHighlight();
      if (q) {
        const first = filteredNodes[0];
        if (first) network.focus(first.id, { animation: { duration: 250 } });
      }
      updateStatus(q ? ('Filtering: ' + filteredNodes.length + ' nodes') : ('Showing ' + filteredNodes.length + ' nodes'));
    }

    function readPhysicsInputs() {
      return {
        repulsion: Number(phyRepulsion.value),
        springLength: Number(phySpringLength.value),
        damping: Number(phyDamping.value),
        centralGravity: Number(phyCentral.value),
        maxVelocity: Number(phyMaxVel.value),
        minVelocity: Number(phyMinVel.value),
        stabilizationIterations: Number(phyIters.value),
      };
    }

    function writePhysicsInputs(v) {
      phyRepulsion.value = String(v.repulsion);
      phySpringLength.value = String(v.springLength);
      phyDamping.value = String(v.damping);
      phyCentral.value = String(v.centralGravity);
      phyMaxVel.value = String(v.maxVelocity);
      phyMinVel.value = String(v.minVelocity);
      phyIters.value = String(v.stabilizationIterations);
    }

    function applyPhysicsValues(v) {
      network.setOptions({
        physics: {
          enabled: physicsOn,
          solver: 'barnesHut',
          stabilization: { enabled: true, iterations: v.stabilizationIterations },
          barnesHut: {
            gravitationalConstant: v.repulsion,
            springLength: v.springLength,
            damping: v.damping,
            centralGravity: v.centralGravity,
            avoidOverlap: 0.4,
          },
          maxVelocity: v.maxVelocity,
          minVelocity: v.minVelocity,
        },
      });
      network.stabilize(v.stabilizationIterations);
      updateStatus('Physics updated');
    }

    fitBtn.addEventListener("click", () => network.fit({ animation: { duration: 250 } }));

    resetBtn.addEventListener("click", () => {
      searchBox.value = "";
      for (const kind of allKinds) { kindVisible[kind] = true; }
      document.querySelectorAll(".kind-pill").forEach((p) => {
        p.classList.remove("off");
        p.querySelector("input").checked = true;
      });
      visNodes.clear(); visEdges.clear();
      visNodes.add(rawNodes.map(makeVisNode));
      visEdges.add(rawEdges.map(makeVisEdge));
      resetHighlight();
      network.fit({ animation: { duration: 250 } });
      updateStatus("Ready");
    });

    let physicsOn = true;
    physicsBtn.addEventListener("click", () => {
      physicsOn = !physicsOn;
      network.setOptions({ physics: { enabled: physicsOn } });
      physicsBtn.textContent = physicsOn ? "Physics: On" : "Physics: Off";
      physicsBtn.classList.toggle("active", physicsOn);
    });

    physicsTuneBtn.addEventListener('click', () => {
      physicsPanel.classList.toggle('visible');
    });

    applyPhysicsBtn.addEventListener('click', () => {
      applyPhysicsValues(readPhysicsInputs());
    });

    resetPhysicsBtn.addEventListener('click', () => {
      writePhysicsInputs(defaultPhysics);
      applyPhysicsValues(defaultPhysics);
    });

    writePhysicsInputs(defaultPhysics);
    currentScale = network.getScale();
    applyLabelsForScale();
  </script>
</body>
</html>
